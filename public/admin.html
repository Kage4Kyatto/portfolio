    <main class="container">
      <section class="page-panel reveal">
        <p class="eyebrow">Admin Dashboard</p>
        <h1>Contact Messages</h1>
        <p class="lead">Enter your admin credentials to load message submissions.</p>
        <p id="delivery-status" class="notice"></p>
      </section>

      <section class="card section-title reveal">
        <form id="admin-auth-form" class="inline-form">
          <div>
            <label for="admin-user">Username</label>
            <input id="admin-user" name="admin-user" type="text" required />
          </div>
          <div>
            <label for="admin-pass">Password</label>
            <input id="admin-pass" name="admin-pass" type="password" required />
          </div>
          <div class="auth-action">
            <button class="btn primary" type="submit">Load Messages</button>
          </div>
        </form>
        <p id="admin-notice" class="notice"></p>

        <div class="admin-controls">
          <div>
            <label for="message-search">Search</label>
            <input id="message-search" type="text" placeholder="Find by name, email, subject, message" />
          </div>
          <div>
            <label for="page-size">Rows per page</label>
            <select id="page-size">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
            </select>
          </div>
          <div class="admin-actions">
            <button id="export-csv" class="btn secondary" type="button">Export CSV</button>
            <button id="prev-page" class="btn secondary" type="button">Prev</button>
            <button id="next-page" class="btn secondary" type="button">Next</button>
          </div>
        </div>
        <p id="page-info" class="notice"></p>

        <div class="table-wrap">
          <table id="messages-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Message</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="messages-body">
              <tr>
                <td colspan="6">No data loaded yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
