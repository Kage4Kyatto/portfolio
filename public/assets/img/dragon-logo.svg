<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="currentColor" stroke-width="2"/>
  
  <!-- Inner circle/background -->
  <circle cx="100" cy="100" r="85" fill="white"/>
  
  <!-- Left staff/wand -->
  <g stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Left staff shaft -->
    <line x1="50" y1="140" x2="110" y2="60"/>
    
    <!-- Left staff top ornament -->
    <circle cx="110" cy="60" r="8"/>
    <circle cx="110" cy="60" r="5" fill="none"/>
    
    <!-- Left staff handle wrap -->
    <line x1="45" y1="145" x2="55" y2="135"/>
    <line x1="45" y1="155" x2="55" y2="145"/>
  </g>
  
  <!-- Right staff/wand -->
  <g stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Right staff shaft -->
    <line x1="150" y1="140" x2="90" y2="60"/>
    
    <!-- Right staff top ornament -->
    <circle cx="90" cy="60" r="8"/>
    <circle cx="90" cy="60" r="5" fill="none"/>
    
    <!-- Right staff handle wrap -->
    <line x1="155" y1="145" x2="145" y2="135"/>
    <line x1="155" y1="155" x2="145" y2="145"/>
  </g>
  
  <!-- Center ornament/binding -->
  <g fill="currentColor">
    <circle cx="100" cy="100" r="6"/>
    <path d="M 90 95 Q 100 90 110 95 L 110 105 Q 100 110 90 105 Z"/>
  </g>
  
  <!-- Decorative circles at crossing points -->
  <circle cx="100" cy="100" r="3" fill="currentColor"/>
  
  <!-- Bottom decorative elements -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <!-- Bottom left accent -->
    <path d="M 70 150 Q 75 160 85 165"/>
    
    <!-- Bottom right accent -->
    <path d="M 130 150 Q 125 160 115 165"/>
    
    <!-- Center bottom element -->
    <path d="M 95 160 L 105 160 L 100 170 Z"/>
  </g>
  
  <!-- Side decorative marks (like &s or flourishes) -->
  <g stroke="currentColor" stroke-width="1.5" fill="none">
    <!-- Right side flourish -->
    <path d="M 155 85 Q 165 90 162 100"/>
    <path d="M 155 100 Q 165 105 162 115"/>
  </g>
  
  <!-- Additional detail lines for complexity -->
  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 85 85 Q 100 90 115 85"/>
    <path d="M 85 115 Q 100 110 115 115"/>
  </g>
</svg>