<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle ring (traditional kamon style) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  
  <!-- Inner circular background -->
  <circle cx="100" cy="100" r="85" fill="white" opacity="0.08"/>
  
  <!-- Hojo Clan Geometric Kamon - Clean, Symmetrical Design -->
  
  <!-- Central circle -->
  <circle cx="100" cy="100" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.85"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="25" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Six-pointed geometric star pattern (Hojo-style) -->
  <!-- Upper point -->
  <path d="M 100 65 L 105 80 L 95 80 Z" fill="white" opacity="0.8"/>
  
  <!-- Upper right point -->
  <path d="M 130 77 L 120 87 L 125 100 Z" fill="white" opacity="0.8"/>
  
  <!-- Lower right point -->
  <path d="M 130 123 L 125 100 L 120 113 Z" fill="white" opacity="0.8"/>
  
  <!-- Lower point -->
  <path d="M 100 135 L 95 120 L 105 120 Z" fill="white" opacity="0.8"/>
  
  <!-- Lower left point -->
  <path d="M 70 123 L 80 113 L 75 100 Z" fill="white" opacity="0.8"/>
  
  <!-- Upper left point -->
  <path d="M 70 77 L 75 100 L 80 87 Z" fill="white" opacity="0.8"/>
  
  <!-- Connecting geometric lines forming hexagon -->
  <line x1="105" y1="80" x2="125" y2="100" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="125" y1="100" x2="105" y2="120" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="105" y1="120" x2="75" y2="100" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="75" y1="100" x2="95" y2="80" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="95" y1="80" x2="100" y2="65" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="65" x2="105" y2="80" stroke="white" stroke-width="1" opacity="0.6"/>
  
  <line x1="125" y1="100" x2="130" y2="123" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="123" x2="105" y2="120" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="105" y1="120" x2="100" y2="135" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="135" x2="95" y2="120" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="95" y1="120" x2="70" y2="123" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="70" y1="123" x2="75" y2="100" stroke="white" stroke-width="1" opacity="0.6"/>
  
  <line x1="75" y1="100" x2="70" y2="77" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="70" y1="77" x2="95" y2="80" stroke="white" stroke-width="1" opacity="0.6"/>
  
  <!-- Central geometric circle pattern -->
  <circle cx="100" cy="100" r="15" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <circle cx="100" cy="100" r="8" fill="white" opacity="0.5"/>
  
  <!-- Radiating lines from center (Hojo detail) -->
  <line x1="100" y1="100" x2="100" y2="65" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="100" x2="130" y2="77" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="100" x2="130" y2="123" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="100" x2="100" y2="135" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="100" x2="70" y2="123" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="100" x2="70" y2="77" stroke="white" stroke-width="1" opacity="0.4"/>
</svg>