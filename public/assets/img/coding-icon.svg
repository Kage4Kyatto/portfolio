<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .code-bg { fill: #030712; }
      .code-line { stroke: #7dd3fc; stroke-width: 2; fill: none; stroke-linecap: round; }
      .code-text { fill: #4ade80; }
      .code-accent { fill: #dbeafe; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" class="code-bg"/>
  
  <!-- Terminal/Code window -->
  <rect x="30" y="30" width="140" height="140" rx="8" fill="rgba(15,23,42,0.8)" stroke="#7dd3fc" stroke-width="2"/>
  
  <!-- Title bar -->
  <rect x="30" y="30" width="140" height="25" rx="8" fill="rgba(125,211,252,0.1)"/>
  <circle cx="45" cy="42" r="3" fill="#ff6b6b"/>
  <circle cx="57" cy="42" r="3" fill="#ffd93d"/>
  <circle cx="69" cy="42" r="3" fill="#4ade80"/>
  
  <!-- Code lines -->
  <g class="code-text" font-family="monospace" font-size="10">
    <text x="45" y="70">function()</text>
    <text x="50" y="85">{</text>
    <text x="55" y="100">return</text>
    <text x="55" y="115">true;</text>
    <text x="50" y="130">}</text>
  </g>
  
  <!-- Cursor blink -->
  <line x1="125" y1="95" x2="125" y2="105" class="code-line"/>
</svg>