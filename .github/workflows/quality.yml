name: Quality Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache: false

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Run Go Helper Smoke Checks
        run: |
          npm run go:message-summary
          npm run go:report-service -- --help

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e -- --retries=2

  lighthouse:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Start Server
        run: npm start &

      - name: Wait for Server
        run: npx wait-on http://127.0.0.1:3000/index.html

      - name: Run Lighthouse CI
        id: lighthouse
        run: npm run lighthouse
        continue-on-error: true

      - name: Report Lighthouse Result
        if: always() && steps.lighthouse.outcome == 'failure'
        run: echo "::warning::Lighthouse CI reported issues (non-blocking in this workflow)."
