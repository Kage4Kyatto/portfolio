version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      npm-root:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend/react-app"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      npm-frontend:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/backend/fastify"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      npm-fastify:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
