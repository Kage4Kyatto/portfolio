services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-php
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORTFOLIO_DATABASE_URL: ${PORTFOLIO_DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  node:
    build:
      context: .
      dockerfile: Dockerfile.node
      target: production
    container_name: portfolio-node
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS_HASH: ${ADMIN_PASS_HASH}
      PORTFOLIO_DATABASE_URL: ${PORTFOLIO_DATABASE_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      - php

